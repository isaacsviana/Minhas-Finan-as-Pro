<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Finanças Pro 2.0</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

    <div class="container">
        <header>
            <h1>Minhas Finanças <span>Pro 2.0</span></h1>
        </header>

        <section class="balance-container">
            <div class="card income">
                <h3>Entradas <span>↑</span></h3>
                <p id="money-plus">R$ 0,00</p>
            </div>
            <div class="card expense">
                <h3>Saídas <span>↓</span></h3>
                <p id="money-minus">R$ 0,00</p>
            </div>
            <div class="card total">
                <h3>Saldo Total <span>$</span></h3>
                <p id="balance">R$ 0,00</p>
            </div>
        </section>

        <section class="chart-container">
            <canvas id="expenseChart"></canvas>
        </section>

        <section class="form-container">
            <h3>Nova Transação</h3>
            <form id="form">
                
                <div class="form-type-selector">
                    <input type="radio" id="type-expense" name="trans-type" value="expense" checked>
                    <label for="type-expense" class="label-expense">Saída</label>

                    <input type="radio" id="type-income" name="trans-type" value="income">
                    <label for="type-income" class="label-income">Entrada</label>
                </div>

                <div class="form-group">
                    <label for="text">Descrição</label>
                    <input type="text" id="text" placeholder="Ex: Almoço, Salário..." required />
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Valor (R$)</label>
                        <input type="number" id="amount" placeholder="0,00" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="date">Data</label>
                        <input type="date" id="date" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Categoria</label>
                    <select id="category" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="food">🍔 Alimentação</option>
                        <option value="home">🏠 Moradia</option>
                        <option value="transport">🚗 Transporte</option>
                        <option value="leisure">🎮 Lazer/Streaming</option>
                        <option value="health">💊 Saúde</option>
                        <option value="salary">💰 Salário/Renda</option>
                        <option value="other">⚙️ Outros</option>
                    </select>
                </div>

                <button class="btn-add">Adicionar Transação</button>
            </form>
        </section>

        <section class="history-container">
             <h3>Histórico Recente</h3>
             <ul id="list" class="transactions-list">
                 </ul>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
